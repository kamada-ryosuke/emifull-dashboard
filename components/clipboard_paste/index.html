<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0f172a;
      background: transparent;
    }
    #drop {
      min-height: 118px;
      border: 2px dashed #93c5fd;
      border-radius: 10px;
      background: #eff6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      outline: none;
      cursor: text;
      transition: border-color .15s, background .15s;
    }
    #drop:focus {
      border-color: #2563eb;
      background: #dbeafe;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .sub {
      color: #64748b;
      font-size: 13px;
    }
    #preview {
      display: none;
      max-height: 180px;
      max-width: 100%;
      margin-top: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
    }
    .status {
      margin-top: 8px;
      font-size: 13px;
      color: #166534;
    }
    .error {
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div id="drop" tabindex="0" aria-label="電子車検証スクショ貼り付け欄">
    <div>
      <div class="title">ここをクリックして Ctrl+V</div>
      <div class="sub">電子車検証のスクショ画像を貼り付けできます</div>
      <img id="preview" alt="貼り付け画像プレビュー" />
      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    function send(type, data) {
      window.parent.postMessage({ isStreamlitMessage: true, type, ...data }, "*");
    }

    function setHeight() {
      send("streamlit:setFrameHeight", { height: document.body.scrollHeight + 4 });
    }

    send("streamlit:componentReady", { apiVersion: 1 });
    setHeight();

    const drop = document.getElementById("drop");
    const preview = document.getElementById("preview");
    const status = document.getElementById("status");

    drop.addEventListener("click", () => drop.focus());

    window.addEventListener("paste", async (event) => {
      const items = event.clipboardData ? Array.from(event.clipboardData.items) : [];
      const imageItem = items.find((item) => item.type && item.type.startsWith("image/"));
      if (!imageItem) {
        status.textContent = "画像がクリップボードにありません。スクショをコピーしてから貼り付けてください。";
        status.className = "status error";
        setHeight();
        return;
      }

      const file = imageItem.getAsFile();
      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result;
        preview.src = dataUrl;
        preview.style.display = "block";
        status.textContent = "貼り付けました。下の「貼り付け画像を読み取る」を押してください。";
        status.className = "status";
        send("streamlit:setComponentValue", {
          value: {
            data: dataUrl,
            mime: file.type || "image/png",
            name: file.name || "clipboard.png",
            size: file.size || 0,
            pastedAt: new Date().toISOString()
          }
        });
        setHeight();
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
